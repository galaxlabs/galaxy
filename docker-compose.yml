services:
  postgres:
    image: postgres:16
    container_name: galaxy-postgres
    environment:
      POSTGRES_DB: galaxy_default
      POSTGRES_USER: galaxy_default_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galaxy_default_user -d galaxy_default"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
