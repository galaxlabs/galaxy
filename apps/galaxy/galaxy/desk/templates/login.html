<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy — Login</title>
  <link rel="stylesheet" href="/static/desk.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
  <div class="login-container">
    <form id="login-form" class="login-form">
      <h1>Galaxy</h1>
      <p class="login-subtitle">Sign in to your workspace</p>
      <div id="login-error" class="login-error" style="display:none"></div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="Administrator" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const errorEl = document.getElementById("login-error");
      errorEl.style.display = "none";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const resp = await fetch("/api/auth/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username, password}),
        });
        if (resp.ok) {
          await new Promise(r => setTimeout(r, 100));
          window.location.href = "/desk";
        } else {
          const data = await resp.json();
          errorEl.textContent = data.error || "Login failed.";
          errorEl.style.display = "block";
        }
      } catch (err) {
        errorEl.textContent = "Network error. Is the server running?";
        errorEl.style.display = "block";
      }
    });
  </script>
  <script src="/static/js/galaxy.js"></script>
</body>
</html>
