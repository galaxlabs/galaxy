{% extends "base.html" %}
{% block title %}Tenants — Galaxy Desk{% endblock %}
{% block heading %}Tenants{% endblock %}
{% block content %}
<div class="toolbar">
  <button onclick="showCreateForm()" class="btn btn-primary">New Tenant</button>
</div>

<div id="create-form" class="detail-card" style="display:none;margin-bottom:1.5rem">
  <h3>Create Tenant</h3>
  <div class="detail-row">
    <span class="detail-label">Name</span>
    <input id="new-name" class="detail-value" placeholder="e.g. acme-corp" />
  </div>
  <div class="detail-row">
    <span class="detail-label">Display Name</span>
    <input id="new-display" class="detail-value" placeholder="Acme Corp" />
  </div>
  <div class="detail-row">
    <span class="detail-label">Domain</span>
    <input id="new-domain" class="detail-value" placeholder="acme.example.com" />
  </div>
  <div style="margin-top:0.75rem">
    <button onclick="createTenant()" class="btn btn-primary">Save</button>
    <button onclick="hideCreateForm()" class="btn">Cancel</button>
  </div>
</div>

<table class="table" id="tenant-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Display Name</th>
      <th>Domain</th>
      <th>Status</th>
      <th>Created</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tenant-rows"></tbody>
</table>

<script>
async function loadTenants() {
  const res = await fetch("/api/tenants");
  const json = await res.json();
  const tbody = document.getElementById("tenant-rows");
  tbody.innerHTML = "";
  if (!json.success || !json.data) return;
  for (const t of json.data) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${esc(t.name)}</td>
      <td>${esc(t.display_name)}</td>
      <td>${esc(t.domain || "")}</td>
      <td>${esc(t.status)}</td>
      <td>${t.created_at ? new Date(t.created_at).toLocaleString() : ""}</td>
      <td>
        <button onclick="deleteTenant('${esc(t.name)}')" class="btn btn-danger btn-sm">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function showCreateForm() { document.getElementById("create-form").style.display = "block"; }
function hideCreateForm() { document.getElementById("create-form").style.display = "none"; }

async function createTenant() {
  const name = document.getElementById("new-name").value.trim();
  if (!name) { alert("Name is required"); return; }
  const res = await fetch("/api/tenants", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      name,
      display_name: document.getElementById("new-display").value.trim(),
      domain: document.getElementById("new-domain").value.trim(),
    }),
  });
  const json = await res.json();
  if (!json.success) { alert(json.error); return; }
  hideCreateForm();
  document.getElementById("new-name").value = "";
  document.getElementById("new-display").value = "";
  document.getElementById("new-domain").value = "";
  await loadTenants();
}

async function deleteTenant(name) {
  if (!confirm(`Delete tenant "${name}"?`)) return;
  const res = await fetch(`/api/tenants/${encodeURIComponent(name)}`, { method: "DELETE" });
  const json = await res.json();
  if (!json.success) { alert(json.error); return; }
  await loadTenants();
}

loadTenants();
</script>
{% endblock %}
